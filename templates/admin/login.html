<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - NextTechDaily</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <div class="container header-content">
        <h1 class="logo">NextTech<span>Daily</span> Admin</h1>
        <nav>
            <ul class="nav-links">
                <li><a href="{{ url_for('index') }}">Back to Home</a></li>
            </ul>
        </nav>
    </div>
</header>

<main class="container">
    <section class="login-form">
        <h2>Admin Login</h2>
        
        {% if error %}
            <div class="error-message" style="color: red; margin-bottom: 15px;">
                {{ error }}
            </div>
        {% endif %}
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required 
                       style="width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 15px;">
            </div>
            
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required 
                       style="width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 15px;">
            </div>
            
            <button type="submit" style="padding: 10px 20px; background-color: #333; color: white; border: none; cursor: pointer;">
                Login
            </button>
        </form>
        
    </section>
</main>

<footer>
    <p>© 2026 NextTechDaily — Admin Login</p>
</footer>

</body>
</html>
