services:
  - type: web
    name: nexttechdaily
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: Admin@123  # Change this after first login
    disk:
      name: blog-data
      mountPath: /data
      sizeGB: 1